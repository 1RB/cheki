name: cheki
description: >
  A Dart client library for cheki, a free Ethiopian receipt verification service.
  Verify bank transfer receipts from CBE, Telebirr, BOA, M-Pesa, Dashen, Awash, Zemen, CBE Birr, Siinqee, and eBirr.
version: 1.4.1
homepage: https://chekiapp.vercel.app
repository: https://github.com/1RB/cheki
issue_tracker: https://github.com/1RB/cheki/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  http: ^1.2.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0

topics:
  - api
  - http
  - receipt
  - verification
  - ethiopia
  - cbe
  - telebirr
  - m-pesa
  - dashen
  - awash
  - zemen
  - eBirr
