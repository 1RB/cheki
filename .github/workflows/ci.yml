name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

  python-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: python
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        working-directory: python
        run: pytest -q

  version-check:
    name: Check version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check version alignment
        run: |
          WEB=$(node -p "require('./package.json').version")
          TS=$(node -p "require('./sdks/typescript/package.json').version")
          PY=$(grep '^version = ' python/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

          if [ "$WEB" != "$TS" ]; then
            echo "❌ Version mismatch: web ($WEB) vs TypeScript SDK ($TS)"
            exit 1
          fi

          if [ "$WEB" != "$PY" ]; then
            echo "❌ Version mismatch: web ($WEB) vs Python SDK ($PY)"
            exit 1
          fi

          echo "✅ All versions synced: $WEB"
